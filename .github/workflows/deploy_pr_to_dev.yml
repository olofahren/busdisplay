name: Deploy PR preview to development

on:
  pull_request:
    branches:
      - development
    types: [opened, reopened, synchronize, closed]

env:
  IMAGE_NAME: olofahren/simple-webapp-busdisplay_dev
  CONTAINER_PREFIX: busdisplay-pr
  PREVIEW_DOMAIN_SUFFIX: dev.bussitetest.olof.site
  TRAEFIK_DOCKER_NETWORK: proxy
  TRAEFIK_CERT_RESOLVER: myresolver

jobs:
  build-and-push:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}
            ${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }}

  deploy:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy PR container on VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -eu

            PR='${{ github.event.pull_request.number }}'
            CONTAINER='${{ env.CONTAINER_PREFIX }}-'"$PR"
            IMAGE='${{ env.IMAGE_NAME }}:pr-'"$PR"
            HOST="$PR-pr.${{ env.PREVIEW_DOMAIN_SUFFIX }}"

            docker pull "$IMAGE"
            docker rm -f "$CONTAINER" >/dev/null 2>&1 || true

            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              --network '${{ env.TRAEFIK_DOCKER_NETWORK }}' \
              -e TRAFIKLAB_API_KEY='${{ secrets.TRAFIKLAB_API_KEY }}' \
              --label traefik.enable=true \
              --label "traefik.docker.network=${{ env.TRAEFIK_DOCKER_NETWORK }}" \
              --label "traefik.http.routers.$CONTAINER.rule=Host(\`$HOST\`)" \
              --label "traefik.http.routers.$CONTAINER.entrypoints=websecure" \
              --label "traefik.http.routers.$CONTAINER.tls=true" \
              --label "traefik.http.routers.$CONTAINER.tls.certresolver=${{ env.TRAEFIK_CERT_RESOLVER }}" \
              --label "traefik.http.services.$CONTAINER.loadbalancer.server.port=3000" \
              "$IMAGE"

            docker image prune -f
            echo "Deployed PR #$PR as https://$HOST"


  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Create Comment
        if: github.event.action != 'closed'
        run: |
          # Use GitHub API to create a comment on the PR
          PR_NUMBER=${{ github.event.pull_request.number }}
          COMMENT="✅ Preview deployed for PR #$PR_NUMBER: https://$PR_NUMBER-pr.${{ env.PREVIEW_DOMAIN_SUFFIX }} "
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          COMMENT_URL="https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments"

          curl -s -H "Authorization: token ${GITHUB_TOKEN}" -X POST $COMMENT_URL -d "{\"body\":\"$COMMENT\"}"


  cleanup:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Remove PR container from VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -eu

            PR='${{ github.event.pull_request.number }}'
            CONTAINER='${{ env.CONTAINER_PREFIX }}-'"$PR"
            IMAGE='${{ env.IMAGE_NAME }}:pr-'"$PR"

            docker rm -f "$CONTAINER" >/dev/null 2>&1 || true
            docker image rm "$IMAGE" >/dev/null 2>&1 || true
            docker image prune -f

            echo "Removed preview deployment for PR #$PR"