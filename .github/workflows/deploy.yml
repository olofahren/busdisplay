name: Build and deploy bussitetest

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: olofahren/simple-webapp-busdisplay

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
            host: ${{ secrets.VPS_HOST }}
            username: ${{ secrets.VPS_USER }}
            key: ${{ secrets.VPS_SSH_KEY }}
            port: ${{ secrets.VPS_PORT }}
            script: |
                set -eu
                cd /opt/busdisplay

                echo "creating .env file on VPS"

                printf 'IMAGE_TAG=%s\n' '${{ github.sha }}' > .env
                printf 'TRAFIKLAB_API_KEY=%s\n' '${{ secrets.TRAFIKLAB_API_KEY }}' >> .env

                echo ".env created:"
                ls -la .env
                grep '^IMAGE_TAG=' .env
                grep '^TRAFIKLAB_API_KEY=' .env | sed 's/=.*$/=***hidden***/'

                docker compose --env-file .env pull
                docker compose --env-file .env up -d
                docker image prune -f